server:
  port: 8086

jwt:
  secret: ferreteria_secret_key_2024_must_be_at_least_256_bits_long_secure
  expiration: 86400000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html